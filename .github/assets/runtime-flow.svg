<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" fill="none">
  <defs>
    <linearGradient id="bg" x1="112" y1="44" x2="1154" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="boxA" x1="106" y1="132" x2="320" y2="274" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="boxB" x1="392" y1="132" x2="606" y2="274" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="boxC" x1="678" y1="132" x2="892" y2="274" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#115E59"/>
    </linearGradient>
    <linearGradient id="boxD" x1="964" y1="132" x2="1178" y2="274" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B45309"/>
      <stop offset="1" stop-color="#92400E"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="360" rx="28" fill="url(#bg)"/>
  <rect x="62" y="50" width="1156" height="260" rx="28" fill="rgba(15, 23, 42, .55)" stroke="rgba(148, 163, 184, .20)" stroke-width="2"/>

  <text x="98" y="98" fill="#F8FAFC" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="800">Runtime flow</text>
  <text x="98" y="124" fill="#94A3B8" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16">Slim input, explicit policy, thin public records, honest sitemap output.</text>

  <rect x="98" y="150" width="216" height="118" rx="22" fill="url(#boxA)"/>
  <text x="122" y="190" fill="#EFF6FF" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="800">1. Source records</text>
  <text x="122" y="218" fill="#DBEAFE" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15">Stored in MinIO or local JSON.</text>
  <text x="122" y="240" fill="#DBEAFE" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15">Legacy fields can exist here.</text>

  <rect x="384" y="150" width="216" height="118" rx="22" fill="url(#boxB)"/>
  <text x="408" y="190" fill="#F5F3FF" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="800">2. Publish policy</text>
  <text x="408" y="218" fill="#EDE9FE" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15">Reject junk and block risky pages.</text>
  <text x="408" y="240" fill="#EDE9FE" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15">Keep the taxonomy fixed.</text>

  <rect x="670" y="150" width="216" height="118" rx="22" fill="url(#boxC)"/>
  <text x="694" y="190" fill="#ECFDF5" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="800">3. Public catalog</text>
  <text x="694" y="218" fill="#D1FAE5" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15">Project to a thin, normalized record.</text>
  <text x="694" y="240" fill="#D1FAE5" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15">Only real public changes bump freshness.</text>

  <rect x="956" y="150" width="216" height="118" rx="22" fill="url(#boxD)"/>
  <text x="980" y="190" fill="#FFFBEB" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="800">4. Public output</text>
  <text x="980" y="218" fill="#FEF3C7" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15">Homepage, categories, tool pages, sitemaps.</text>
  <text x="980" y="240" fill="#FEF3C7" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15">Only essential production jobs stay active.</text>

  <path d="M314 208H374" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round"/>
  <path d="M600 208H660" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round"/>
  <path d="M886 208H946" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round"/>
  <path d="M360 194L384 208L360 222" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M646 194L670 208L646 222" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M932 194L956 208L932 222" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
